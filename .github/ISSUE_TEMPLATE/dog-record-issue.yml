name: "Dog Record Issue"
description: "Report a problem with a dog's page, photo, or adoption success story"
labels: ["dog-record"]
body:
  - type: input
    id: dog-name
    attributes:
      label: Dog's name
      placeholder: "e.g. Bella"
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page URL if known
      placeholder: "e.g. https://rmgreatdane.org/dogs/bella"
    validations:
      required: false

  - type: textarea
    id: whats-wrong
    attributes:
      label: What's wrong
      placeholder: "Describe the problem — wrong photo, incorrect info, missing story, etc."
    validations:
      required: true

  - type: textarea
    id: correct-info
    attributes:
      label: Correct information
      placeholder: "What should it say or show instead?"
    validations:
      required: true
