name: CR Intake
on:
  issues:
    types: [opened]

jobs:
  label-acknowledge-queue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write
    steps:
      - name: Parse, label, acknowledge, and queue to Supabase
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID || '17o8qiin' }}
          SANITY_DATASET: ${{ vars.SANITY_DATASET || 'production' }}
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';
            const num = context.issue.number;
            const url = context.payload.issue.html_url;
            const requester = context.payload.issue.user.login;

            // ── Detect category from template fields ──
            const labels = [];
            let category = 'unknown';

            if (body.includes('Page URL or name')) {
              labels.push('content-update');
              category = 'content-update';
            } else if (body.includes('Who is it for')) {
              labels.push('feature-request');
              category = 'feature-request';
            } else if (body.includes("Dog's name")) {
              labels.push('dog-record');
              category = 'dog-record';
            } else if (body.includes('What happened')) {
              labels.push('bug');
              category = 'bug';
            }

            // ── Detect priority ──
            let priority = 'nice-to-have';
            if (body.includes('Urgent')) {
              labels.push('urgent');
              priority = 'urgent';
            } else if (body.includes('Before launch')) {
              labels.push('before-launch');
              priority = 'before-launch';
            } else if (body.includes('Nice to have')) {
              labels.push('nice-to-have');
              priority = 'nice-to-have';
            }

            // ── Capability classifier gate ──
            // Only simple text/content changes may auto-execute.
            // Everything else requires manual developer or CMS handling.
            const bodyLower = body.toLowerCase();
            const titleLower = title.toLowerCase();

            // Detect signals that push a CR beyond the executor's safe boundary
            const isStudioBug = bodyLower.includes('/studio') || bodyLower.includes('sanity') && bodyLower.includes('error');
            const isSchemaChange = bodyLower.includes('schema') || bodyLower.includes('field') && (bodyLower.includes('add') || bodyLower.includes('remove') || bodyLower.includes('missing'));
            const isFeatureRequest = category === 'feature-request';
            const isCmsOnlyChange = category === 'dog-record' || (bodyLower.includes('sanity') && !bodyLower.includes('page'));

            let autoExecute = false;
            let routeLabel = 'cr-manual-review';
            let routeDescription = 'Queued for manual developer review';

            if (category === 'content-update' && !isStudioBug && !isSchemaChange) {
              // Safe: simple text/content change on a known page
              autoExecute = true;
              routeLabel = 'cr-auto-execute';
              routeDescription = 'Queued for automatic execution';
            } else if (isCmsOnlyChange) {
              routeLabel = 'cr-cms-manual';
              routeDescription = 'This is a CMS content change — requires manual editing in Sanity Studio, not code deployment';
            } else if (isStudioBug) {
              routeLabel = 'cr-studio-bug';
              routeDescription = 'This is a Sanity Studio/editor bug — requires developer triage, not auto-execution';
            } else if (isSchemaChange) {
              routeLabel = 'cr-developer-required';
              routeDescription = 'This requires schema or code changes — routed to developer review';
            } else if (isFeatureRequest) {
              routeLabel = 'cr-developer-required';
              routeDescription = 'Feature requests require developer implementation — routed to manual review';
            } else if (category === 'bug') {
              routeLabel = 'cr-developer-required';
              routeDescription = 'Bug reports require developer investigation — routed to manual review';
            } else if (category === 'unknown') {
              routeLabel = 'cr-manual-review';
              routeDescription = 'Could not classify this request — routed to manual review';
            }

            labels.push(routeLabel);
            labels.push('cr-pending');

            // ── Extract and normalize page URL if present ──
            // FIX: Multiple regex patterns to catch URLs regardless of whitespace,
            // and also scan the full body for any URL containing the site domain.
            let pageUrl = null;
            const pageMatch = body.match(/### Page URL or name\s*\n+\s*(.+)/);
            if (pageMatch) {
              const rawPageUrl = pageMatch[1].trim();
              if (rawPageUrl.startsWith('http://') || rawPageUrl.startsWith('https://')) {
                try { pageUrl = new URL(rawPageUrl).pathname; } catch (e) { /* invalid — store null */ }
              } else if (rawPageUrl) {
                pageUrl = rawPageUrl.startsWith('/') ? rawPageUrl : `/${rawPageUrl}`;
              }
            }
            // Fallback: scan entire body for any rmgdri-site URL
            if (!pageUrl) {
              const urlScan = body.match(/https?:\/\/rmgdri-site\.vercel\.app(\/[^\s)]*)/);
              if (urlScan) { pageUrl = urlScan[1] || '/'; }
            }
            // Fallback: scan for rmgreatdane.org URL
            if (!pageUrl) {
              const orgScan = body.match(/https?:\/\/(?:www\.)?rmgreatdane\.org(\/[^\s)]*)/);
              if (orgScan) { pageUrl = orgScan[1] || '/'; }
            }

            // ── Apply labels ──
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              labels: labels
            });

            // ── Post acknowledgment with honest routing ──
            const ackLines = [
              `## ✅ CR-${num} Received`,
              '',
              'Thank you! This change request has been logged.',
              '',
              `**Tracking ID:** CR-${num}`,
              `**Category:** ${category}`,
              `**Priority:** ${priority}`,
              `**Route:** ${routeDescription}`,
              `**Auto-execute:** ${autoExecute ? 'Yes' : 'No'}`,
            ];

            if (autoExecute) {
              ackLines.push('**Status:** Queued for automatic processing');
              ackLines.push('');
              ackLines.push("You'll receive a notification here when work begins and when it's ready for you to review.");
            } else {
              ackLines.push('**Status:** Received — investigating');
              ackLines.push('');
              ackLines.push('An automated review is underway. You will receive a follow-up with investigation results and next steps.');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: ackLines.join('\n')
            });

            // ── Write to Supabase cr_tasks ──
            const sbUrl = process.env.SUPABASE_URL;
            const sbKey = process.env.SUPABASE_SERVICE_ROLE_KEY;

            if (sbUrl && sbKey) {
              const task = {
                cr_number: num,
                tenant: 'rmgdri',
                source: 'github-issue',
                source_url: url,
                category: category,
                priority: priority,
                status: 'pending',
                title: title,
                description: body,
                page_url: pageUrl,
                payload: {
                  issue_number: num,
                  labels: labels,
                  requester: requester,
                  body: body
                },
                requester: requester,
                auto_execute: autoExecute,
                queued_at: new Date().toISOString()
              };

              const res = await fetch(`${sbUrl}/rest/v1/cr_tasks`, {
                method: 'POST',
                headers: {
                  'apikey': sbKey,
                  'Authorization': `Bearer ${sbKey}`,
                  'Content-Type': 'application/json',
                  'Prefer': 'return=representation'
                },
                body: JSON.stringify(task)
              });

              if (res.ok) {
                const [row] = await res.json();
                core.info(`CR-${num} written to Supabase: ${row.id}`);

                // Remove cr-pending label
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    name: 'cr-pending'
                  });
                } catch (e) { /* label may not exist yet */ }

                if (autoExecute) {
                  // ── Auto-execute path ──
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    labels: ['cr-queued']
                  });

                  // Trigger executor promptly — eliminates 30-90 minute cron wait.
                  // Cron remains as fallback if dispatch fails.
                  try {
                    await github.rest.actions.createWorkflowDispatch({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      workflow_id: 'cr-executor.yml',
                      ref: 'main'
                    });
                    core.info(`CR-${num}: Triggered executor via workflow_dispatch (auto-execute eligible)`);
                  } catch (dispatchErr) {
                    core.warning(`CR-${num}: Failed to trigger executor dispatch: ${dispatchErr.message}. Cron fallback will handle.`);
                  }
                } else {
                  // ══════════════════════════════════════════════════════
                  // INVESTIGATION-FIRST TRIAGE (024A)
                  // Inspect the live page before routing to a human.
                  // Evidence is produced for every decision.
                  // ══════════════════════════════════════════════════════

                  const previewBase = 'https://rmgdri-site.vercel.app';
                  const sbPatchHeaders = {
                    'apikey': sbKey,
                    'Authorization': `Bearer ${sbKey}`,
                    'Content-Type': 'application/json'
                  };

                  // ── Helper: investigate the CR ──
                  async function investigateCR(pUrl, crTitle, crBody) {
                    const stopWords = new Set([
                      'this','that','with','from','have','been','will','would','should',
                      'could','were','when','what','where','which','their','there','these',
                      'those','than','then','them','they','into','your','some','page','site',
                      'also','just','more','very','such','like','over','only','both','back',
                      'after','need','does','done','want','here','able','each','make','made',
                      'about','other','being','before','correctly','expected','updated',
                      'change','changed','added','removed','working','missing',
                    ]);

                    const result = {
                      url: null, http_status: null, body_length: 0,
                      search_terms: [], found_terms: [], missing_terms: [],
                      outcome: 'insufficient_data', evidence: [],
                    };

                    if (!pUrl) {
                      result.outcome = 'invalid_url';
                      result.evidence.push('No page URL provided — cannot inspect live page');
                      return result;
                    }

                    const liveUrl = `${previewBase}${pUrl}`;
                    result.url = liveUrl;

                    try {
                      const resp = await fetch(liveUrl, {
                        method: 'GET',
                        headers: { 'Cache-Control': 'no-cache' },
                        redirect: 'follow',
                      });
                      result.http_status = resp.status;

                      if (!resp.ok) {
                        result.outcome = 'likely_code_issue';
                        result.evidence.push(`HTTP ${resp.status} — page not accessible`);
                        return result;
                      }

                      const pageText = await resp.text();
                      result.body_length = pageText.length;

                      if (pageText.length < 500) {
                        result.outcome = 'insufficient_data';
                        result.evidence.push(`Page body suspiciously short (${pageText.length} chars)`);
                        return result;
                      }

                      // Extract search terms from issue title and body
                      const allWords = `${crTitle} ${crBody}`.toLowerCase().match(/\b[a-z]{4,}\b/g) || [];
                      const candidates = [...new Set(allWords)].filter(w => !stopWords.has(w)).slice(0, 12);
                      result.search_terms = candidates;

                      const pageLower = pageText.toLowerCase();
                      result.found_terms = candidates.filter(t => pageLower.includes(t));
                      result.missing_terms = candidates.filter(t => !pageLower.includes(t));

                      // Error/not-found pattern detection
                      const hasError = /\b(error|exception|undefined is not|cannot read prop|stack trace)\b/i.test(pageText);
                      const hasNotFound = /\b(404|page not found|this page could not be found)\b/i.test(pageText);

                      if (hasError || hasNotFound) {
                        result.outcome = 'likely_code_issue';
                        result.evidence.push(`Page contains error/not-found indicators`);
                      } else if (candidates.length >= 3 && result.found_terms.length === 0) {
                        result.outcome = 'content_issue_detected';
                        result.evidence.push(`None of ${candidates.length} expected terms found on page`);
                      } else if (candidates.length >= 3 && result.missing_terms.length > result.found_terms.length * 2) {
                        result.outcome = 'content_issue_detected';
                        result.evidence.push(`Majority of expected terms missing (found ${result.found_terms.length}, missing ${result.missing_terms.length})`);
                      } else if (result.found_terms.length > 0) {
                        result.outcome = 'no_issue_reproduced';
                        result.evidence.push(`Page accessible (${pageText.length} chars), expected terms present`);
                      } else {
                        result.outcome = 'insufficient_data';
                        result.evidence.push(`Too few search terms to assess — cannot determine issue state`);
                      }
                    } catch (fetchErr) {
                      result.outcome = 'insufficient_data';
                      result.evidence.push(`Fetch error: ${fetchErr.message}`);
                    }

                    return result;
                  }

                  // ── Helper: Sanity-aware investigation (024B) ──
                  // Queries Sanity CMS (read-only) to detect content/state issues
                  // before routing to a developer. No mutations.
                  // FIX: Only runs dog-name queries when the CR is actually about dogs.
                  async function investigateSanity(pUrl, crTitle, crBody) {
                    const projectId = process.env.SANITY_PROJECT_ID;
                    const dataset = process.env.SANITY_DATASET;
                    if (!projectId || !dataset) return null;

                    const apiBase = `https://${projectId}.api.sanity.io/v2024-01-01/data/query/${dataset}`;

                    async function sanityQuery(groq) {
                      const url = new URL(apiBase);
                      url.searchParams.set('query', groq);
                      const resp = await fetch(url.toString());
                      if (!resp.ok) return null;
                      const data = await resp.json();
                      return data.result;
                    }

                    const findings = [];
                    const queriesRun = [];
                    let signal = null;

                    // FIX: Determine if this CR is dog-related before searching for dog names.
                    // Non-dog CRs (layout, forms, features, studio bugs) should NOT trigger
                    // dog-name extraction — that causes drift and hallucination.
                    const combined = `${crTitle} ${crBody}`.toLowerCase();
                    // isDogRelated: narrow check — only true when CR is specifically
                    // about a dog record, not when "dog" appears incidentally.
                    const hasDogNameField = combined.includes("### dog") && combined.includes("name");
                    const isDogUrl = pUrl && (pUrl.includes('available-dane') || pUrl.includes('adoption-successes') || pUrl.includes('/dogs/'));
                    const isDogRelated = (
                      category === 'dog-record' ||
                      hasDogNameField ||
                      isDogUrl
                    );

                    if (!isDogRelated) {
                      findings.push('CR is not dog-related — skipping dog name search');
                      // Still run URL-based queries (adoption counts, available counts) if applicable
                    }

                    // Extract potential dog names ONLY for dog-related CRs
                    const commonWords = new Set([
                      'Page','What','When','Where','This','That','Form','Home','Error',
                      'Great','Dane','Rocky','Mountain','Rescue','Adoption','Available',
                      'Success','Computer','Browser','Chrome','Safari','Firefox','Device',
                      'Screenshots','Nice','Before','Urgent','Meet','Found','Forever',
                      'Homes','Update','Admin','Intent','Contact','Remove','Header',
                      'Footer','Layout','Studio','Display','Menu','Content','Website',
                      'Portal','Application','Submission','Volunteer','Foster','Medical',
                      'Transport','Intake','Screening','Board','Director','Status',
                      'Field','Button','Link','Text','Image','Photo','Video','Format',
                      'Date','Time','Email','Phone','Address','Name','Title','Description',
                    ]);
                    let dogNames = [];

                    if (isDogRelated) {
                      const namePattern = /\b([A-Z][a-z]{2,})\b/g;
                      const allNames = [
                        ...(crTitle.match(namePattern) || []),
                        ...(crBody.match(namePattern) || []),
                      ];
                      dogNames = [...new Set(allNames)].filter(n => !commonWords.has(n));
                    }

                    // Also check structured "Dog's name" field
                    const dogFieldMatch = crBody.match(/### Dog'?s? name\s*\n\s*(.+)/i);
                    if (dogFieldMatch) {
                      const parsed = dogFieldMatch[1].trim().split(/[,&]+/).map(n => n.trim()).filter(Boolean);
                      dogNames = [...new Set([...parsed, ...dogNames])];
                    }

                    // Query for each potential dog name (max 3)
                    for (const name of dogNames.slice(0, 3)) {
                      const q = `*[_type == "dog" && name match "${name}*"]{ _id, name, status, hideFromWebsite, adoptionYear, adoptionDate, slug }`;
                      queriesRun.push(`dog: "${name}"`);

                      try {
                        const dogs = await sanityQuery(q);
                        if (!dogs || dogs.length === 0) {
                          findings.push(`Dog "${name}" not found in Sanity CMS`);
                          continue;
                        }
                        for (const dog of dogs) {
                          findings.push(`"${dog.name}" — status: ${dog.status}, hidden: ${dog.hideFromWebsite || false}, adoptionYear: ${dog.adoptionYear || 'not set'}`);

                          if (dog.hideFromWebsite) {
                            signal = signal || 'content_hidden';
                            findings.push(`⚠ "${dog.name}" has hideFromWebsite=true — won't appear on public pages`);
                          }
                          if (dog.status === 'adopted' && !dog.adoptionYear) {
                            signal = signal || 'content_missing_field';
                            findings.push(`⚠ "${dog.name}" is adopted but adoptionYear not set — won't appear on success page`);
                          }
                          if (dog.status !== 'adopted' && pUrl && pUrl.includes('adoption-successes')) {
                            signal = signal || 'status_mismatch';
                            findings.push(`⚠ "${dog.name}" status is "${dog.status}" (not adopted) — won't appear on adoption successes`);
                          }
                        }
                      } catch (e) {
                        findings.push(`Sanity query for "${name}" failed: ${e.message}`);
                      }
                    }

                    // If URL is adoption-successes/YEAR, check count for that year
                    const yearMatch = pUrl && pUrl.match(/adoption-successes\/(\d{4})/);
                    if (yearMatch) {
                      const year = yearMatch[1];
                      queriesRun.push(`adoption count: ${year}`);
                      try {
                        const count = await sanityQuery(
                          `count(*[_type == "dog" && status == "adopted" && adoptionYear == "${year}" && hideFromWebsite != true])`
                        );
                        findings.push(`Sanity: ${count} adopted dogs for ${year} (visible)`);
                        if (count === 0) {
                          signal = signal || 'content_missing';
                          findings.push(`⚠ No visible adopted dogs in Sanity for ${year}`);
                        }
                      } catch (e) {
                        findings.push(`Sanity year count failed: ${e.message}`);
                      }
                    }

                    // If URL is available-danes, check available count
                    if (pUrl && pUrl.includes('available-dane')) {
                      queriesRun.push('available dogs count');
                      try {
                        const count = await sanityQuery(
                          `count(*[_type == "dog" && status in ["available","pending","foster-needed","waiting-transport","under-evaluation","medical-hold","behavior-hold"] && hideFromWebsite != true])`
                        );
                        findings.push(`Sanity: ${count} available dogs (visible)`);
                      } catch (e) {
                        findings.push(`Sanity available count failed: ${e.message}`);
                      }
                    }

                    return {
                      queries_run: queriesRun,
                      findings,
                      signal,
                      dog_names_searched: dogNames.slice(0, 3),
                    };
                  }

                  // ── Apply investigating state ──
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: num, labels: ['cr-investigating']
                  });

                  try {
                    await fetch(`${sbUrl}/rest/v1/cr_tasks?id=eq.${row.id}`, {
                      method: 'PATCH', headers: sbPatchHeaders,
                      body: JSON.stringify({ status: 'investigating' })
                    });
                  } catch (e) {
                    core.warning(`CR-${num}: Supabase PATCH to investigating failed: ${e.message}`);
                  }

                  core.info(`CR-${num}: Entering investigation phase`);

                  // ── Run page investigation ──
                  const inv = await investigateCR(pageUrl, title, body);

                  // ── Run Sanity investigation (024B) ──
                  let sanityInv = null;
                  try {
                    sanityInv = await investigateSanity(pageUrl, title, body);
                    if (sanityInv) {
                      inv.sanity = sanityInv;

                      // Sanity signals can override non-definitive page outcomes,
                      // but ONLY when the CR is actually dog-related AND the signal
                      // came from a relevant dog query — not from false-positive name matching.
                      const overridable = ['no_issue_reproduced', 'insufficient_data', 'invalid_url'];
                      if (sanityInv.signal && overridable.includes(inv.outcome) && sanityInv.dog_names_searched && sanityInv.dog_names_searched.length > 0) {
                        const priorOutcome = inv.outcome;
                        inv.outcome = 'content_issue_detected';
                        inv.evidence.push(`Sanity CMS signal: ${sanityInv.signal} — overrides ${priorOutcome}`);
                      } else if (sanityInv.signal && overridable.includes(inv.outcome)) {
                        // Signal exists but no dog names were searched — don't override, just note it
                        inv.evidence.push(`Sanity CMS signal noted (${sanityInv.signal}) but not overriding — CR is not dog-specific`);
                      }
                    }
                  } catch (sanityErr) {
                    core.warning(`CR-${num}: Sanity investigation failed (non-fatal): ${sanityErr.message}`);
                  }

                  // ── Post investigation report ──
                  const outcomeLabels = {
                    no_issue_reproduced: 'No issue reproduced',
                    content_issue_detected: 'Content issue detected',
                    likely_code_issue: 'Likely code issue',
                    invalid_url: 'Invalid URL',
                    insufficient_data: 'Insufficient data',
                  };
                  const reportLines = [
                    `## 🔍 CR-${num} — Investigation Report`,
                    '',
                    `**Outcome:** ${outcomeLabels[inv.outcome] || inv.outcome}`,
                    inv.url ? `**URL inspected:** ${inv.url}` : '**URL:** none provided',
                    inv.http_status != null ? `**HTTP status:** ${inv.http_status}` : '',
                    inv.body_length ? `**Page size:** ${inv.body_length} chars` : '',
                    '',
                    '**Evidence:**',
                    ...inv.evidence.map(e => `- ${e}`),
                  ];
                  if (inv.search_terms.length) {
                    reportLines.push('', `**Search terms:** \`${inv.search_terms.join('`, `')}\``);
                    if (inv.found_terms.length) reportLines.push(`**Found on page:** \`${inv.found_terms.join('`, `')}\``);
                    if (inv.missing_terms.length) reportLines.push(`**Not found on page:** \`${inv.missing_terms.join('`, `')}\``);
                  }
                  if (sanityInv && sanityInv.findings.length) {
                    reportLines.push('', '**Sanity CMS inspection:**');
                    for (const f of sanityInv.findings) { reportLines.push(`- ${f}`); }
                    if (sanityInv.queries_run.length) {
                      reportLines.push(`- _Queries: ${sanityInv.queries_run.join(', ')}_`);
                    }
                  }

                  // Routing decision language
                  const routeDecisions = {
                    no_issue_reproduced: 'Issue not reproduced from automated check. Holding for requester clarification.',
                    content_issue_detected: `Content issue detected — assigned to @${context.repo.owner} for review.`,
                    likely_code_issue: `Code-level issue suspected — assigned to @${context.repo.owner} for developer triage.`,
                    invalid_url: 'URL could not be resolved. Requesting clarification from requester.',
                    insufficient_data: `Insufficient data for automated assessment — assigned to @${context.repo.owner} for manual review.`,
                  };
                  reportLines.push('', `**Routing:** ${routeDecisions[inv.outcome]}`);

                  await github.rest.issues.createComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: num,
                    body: reportLines.filter(l => l !== '').join('\n')
                  });

                  // ── Remove investigating label ──
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: num, name: 'cr-investigating'
                    });
                  } catch (e) { /* may not exist */ }

                  // ── Route based on investigation outcome ──
                  const investigationResult = {
                    investigation: inv,
                    investigated_at: new Date().toISOString(),
                    classifier_route: routeLabel,
                  };

                  if (inv.outcome === 'invalid_url') {
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: num, labels: ['cr-needs-clarification']
                    });
                    try {
                      await fetch(`${sbUrl}/rest/v1/cr_tasks?id=eq.${row.id}`, {
                        method: 'PATCH', headers: sbPatchHeaders,
                        body: JSON.stringify({ status: 'needs-clarification', result: investigationResult })
                      });
                    } catch (e) { core.warning(`CR-${num}: Supabase PATCH failed: ${e.message}`); }
                    core.info(`CR-${num}: Investigation → invalid_url → needs-clarification`);

                  } else if (inv.outcome === 'no_issue_reproduced') {
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: num, labels: ['cr-hold']
                    });
                    try {
                      await fetch(`${sbUrl}/rest/v1/cr_tasks?id=eq.${row.id}`, {
                        method: 'PATCH', headers: sbPatchHeaders,
                        body: JSON.stringify({ status: 'hold', result: investigationResult })
                      });
                    } catch (e) { core.warning(`CR-${num}: Supabase PATCH failed: ${e.message}`); }
                    core.info(`CR-${num}: Investigation → no_issue_reproduced → hold`);

                  } else {
                    // content_issue_detected | likely_code_issue | insufficient_data → manual handoff
                    await github.rest.issues.addLabels({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: num, labels: ['cr-manual-handoff']
                    });
                    try {
                      await fetch(`${sbUrl}/rest/v1/cr_tasks?id=eq.${row.id}`, {
                        method: 'PATCH', headers: sbPatchHeaders,
                        body: JSON.stringify({ status: 'manual-handoff', result: investigationResult })
                      });
                    } catch (e) { core.warning(`CR-${num}: Supabase PATCH failed: ${e.message}`); }

                    await github.rest.issues.addAssignees({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: num, assignees: [context.repo.owner]
                    });
                    core.info(`CR-${num}: Investigation → ${inv.outcome} → manual-handoff, assigned to ${context.repo.owner}`);
                  }
                }
              } else {
                const err = await res.text();
                core.warning(`Failed to queue CR-${num} to Supabase: ${err}`);
              }
            }
