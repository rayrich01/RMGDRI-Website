name: PR Comment CR Detection
on:
  issue_comment:
    types: [created]

jobs:
  detect-cr:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '**Page:**')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Create tracking issue and queue CR
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const body = context.payload.comment.body || '';
            const prNum = context.payload.issue.number;
            const commentId = context.payload.comment.id;
            const requester = context.payload.comment.user.login;
            const commentUrl = context.payload.comment.html_url;

            // ── React with eyes ──
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              content: 'eyes'
            });

            // ── Parse page and description from CR format ──
            const pageMatch = body.match(/\*\*Page:\*\*\s*(.+)/);
            const changeMatch = body.match(/\*\*What to change:\*\*\s*([\s\S]*?)(?=\*\*|$)/);
            const textMatch = body.match(/\*\*New text:\*\*\s*([\s\S]*?)$/);

            const page = pageMatch ? pageMatch[1].trim() : 'unknown page';
            const changeDesc = changeMatch ? changeMatch[1].trim() : '';
            const newText = textMatch ? textMatch[1].trim() : '';

            const description = [
              changeDesc,
              newText ? `New text: ${newText}` : ''
            ].filter(Boolean).join('\n\n');

            // ── Create a GitHub Issue for unique CR tracking ──
            const issueBody = [
              `## Change Request`,
              '',
              `**Page:** ${page}`,
              changeDesc ? `**What to change:** ${changeDesc}` : '',
              newText ? `**New text:** ${newText}` : '',
              '',
              '---',
              `**Source:** [PR #${prNum} comment](${commentUrl})`,
              `**Requester:** @${requester}`,
              `**Category:** content-update`,
              `**Auto-execute:** Yes`,
            ].filter(Boolean).join('\n');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CR: ${page} — ${changeDesc.slice(0, 80) || 'content update'}`,
              body: issueBody,
              labels: ['content-update', 'before-launch', 'cr-queued']
            });

            const crNum = issue.data.number;
            core.info(`Created tracking issue #${crNum} for PR #${prNum} comment`);

            // ── Acknowledge on the PR so Lori sees it inline ──
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
              body: [
                `## CR-${crNum} Received`,
                '',
                `**Page:** ${page}`,
                changeDesc ? `**What to change:** ${changeDesc}` : '',
                newText ? `**New text:** ${newText}` : '',
                '',
                `**Tracking:** #${crNum}`,
                `**Status:** Queued for processing`,
              ].filter(Boolean).join('\n')
            });

            // ── React with rocket on original comment ──
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              content: 'rocket'
            });

            // ── Write to Supabase ──
            const sbUrl = process.env.SUPABASE_URL;
            const sbKey = process.env.SUPABASE_SERVICE_ROLE_KEY;

            if (sbUrl && sbKey) {
              const task = {
                cr_number: crNum,
                tenant: 'rmgdri',
                source: 'github-pr-comment',
                source_url: commentUrl,
                category: 'content-update',
                priority: 'before-launch',
                status: 'pending',
                title: `CR-${crNum}: ${page}`,
                description: description,
                page_url: page,
                payload: {
                  pr_number: prNum,
                  issue_number: crNum,
                  comment_id: commentId,
                  requester: requester,
                  body: body
                },
                requester: requester,
                auto_execute: true,
                queued_at: new Date().toISOString()
              };

              const res = await fetch(`${sbUrl}/rest/v1/cr_tasks`, {
                method: 'POST',
                headers: {
                  'apikey': sbKey,
                  'Authorization': `Bearer ${sbKey}`,
                  'Content-Type': 'application/json',
                  'Prefer': 'return=representation'
                },
                body: JSON.stringify(task)
              });

              if (res.ok) {
                const [row] = await res.json();
                core.info(`CR-${crNum} queued to Supabase: ${row.id}`);
              } else {
                core.warning(`Failed to queue CR-${crNum}: ${await res.text()}`);
              }
            }
