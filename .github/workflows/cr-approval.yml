name: CR Approval Handler

on:
  issue_comment:
    types: [created]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-approval:
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.issue.labels.*.name, 'cr-review') &&
      (
        contains(toLower(github.event.comment.body), 'approved') ||
        contains(toLower(github.event.comment.body), 'looks good') ||
        contains(toLower(github.event.comment.body), 'lgtm')
      )
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close CR and update Supabase
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const num = context.issue.number;
            const approver = context.payload.comment.user.login;

            // Remove cr-review, add cr-closed
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                name: 'cr-review'
              });
            } catch (e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              labels: ['cr-closed']
            });

            // Post closure comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              body: [
                `## ✅ CR-${num} Approved and Closed`,
                '',
                `**Approved by:** @${approver}`,
                `**Closed:** ${new Date().toISOString()}`,
                '',
                'This change request is complete. Thank you!'
              ].join('\n')
            });

            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              state: 'closed'
            });

            // Update Supabase
            const sbUrl = process.env.SUPABASE_URL;
            const sbKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
            if (sbUrl && sbKey) {
              const headers = {
                'apikey': sbKey,
                'Authorization': `Bearer ${sbKey}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              };

              await fetch(
                `${sbUrl}/rest/v1/cr_tasks?cr_number=eq.${num}&tenant=eq.rmgdri`,
                {
                  method: 'PATCH',
                  headers,
                  body: JSON.stringify({
                    status: 'closed',
                    completed_at: new Date().toISOString()
                  })
                }
              );
            }

            core.info(`CR-${num} approved by ${approver} and closed`);

  check-reactions:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      issues: write
    steps:
      - name: Check cr-review issues for thumbs-up reactions
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            // Find all open issues with cr-review label
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cr-review',
              state: 'open'
            });

            for (const issue of issues.data) {
              // Get comments
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              // Find the bot completion comment
              const botComment = comments.data.find(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('deployed and live')
              );

              if (!botComment) continue;

              // Check reactions on it
              const reactions = await github.rest.reactions.listForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id
              });

              const hasApproval = reactions.data.some(r =>
                r.content === '+1' &&
                r.user.login !== 'github-actions[bot]'
              );

              if (hasApproval) {
                const approver = reactions.data.find(r =>
                  r.content === '+1' &&
                  r.user.login !== 'github-actions[bot]'
                ).user.login;

                // Same closure logic as above
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'cr-review'
                  });
                } catch (e) {}

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['cr-closed']
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    `## ✅ CR-${issue.number} Approved and Closed`,
                    '',
                    `**Approved by:** @${approver} (👍 reaction)`,
                    `**Closed:** ${new Date().toISOString()}`,
                    '',
                    'This change request is complete. Thank you!'
                  ].join('\n')
                });

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });

                // Update Supabase
                const sbUrl = process.env.SUPABASE_URL;
                const sbKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
                if (sbUrl && sbKey) {
                  await fetch(
                    `${sbUrl}/rest/v1/cr_tasks?cr_number=eq.${issue.number}&tenant=eq.rmgdri`,
                    {
                      method: 'PATCH',
                      headers: {
                        'apikey': sbKey,
                        'Authorization': `Bearer ${sbKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                      },
                      body: JSON.stringify({
                        status: 'closed',
                        completed_at: new Date().toISOString()
                      })
                    }
                  );
                }
              }
            }
