name: CR Completion Notifier
on:
  # Poll every 5 minutes for completed tasks
  schedule:
    - cron: '*/5 * * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  notify-completed:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check for completed CRs and notify
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        with:
          script: |
            const sbUrl = process.env.SUPABASE_URL;
            const sbKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
            if (!sbUrl || !sbKey) return;

            const headers = {
              'apikey': sbKey,
              'Authorization': `Bearer ${sbKey}`,
              'Content-Type': 'application/json'
            };

            // ── Fetch tasks in 'review' status (completed but not yet notified) ──
            const res = await fetch(
              `${sbUrl}/rest/v1/cr_tasks?status=eq.review&select=*`,
              { headers }
            );
            if (!res.ok) return;
            const tasks = await res.json();

            for (const task of tasks) {
              const result = task.result || {};
              const crNum = task.cr_number;
              const source = task.source;
              const pageUrl = task.page_url || '';

              // ── Build preview link ──
              const previewLink = result.preview_url
                ? `**[Click here to review the change](${result.preview_url})**`
                : '_(no preview link available)_';

              // ── Build a short excerpt of the original request ──
              const desc = task.description || '';
              const excerpt = desc.length > 200 ? desc.slice(0, 200) + '…' : desc;
              const sourceLink = task.source_url
                ? `[your comment](${task.source_url})`
                : 'your comment';

              // ── Build completion comment ──
              let comment = [
                `## ✅ Change deployed and live`,
                '',
              ];

              if (pageUrl) comment.push(`**Page:** ${pageUrl}`);

              // Show what was requested so Lori can match this to her comment
              if (excerpt) {
                comment.push(`**Requested:** ${excerpt}`);
              }

              comment.push(`**Source:** ${sourceLink}`);
              if (result.commit) comment.push(`**Commit:** \`${result.commit}\``);
              if (result.files_changed?.length) {
                comment.push(`**Files changed:** ${result.files_changed.join(', ')}`);
              }

              comment.push('');
              comment.push(`### Please validate`);
              comment.push(`1. ${previewLink}`);
              comment.push(`2. Verify the change looks correct on the live page.`);
              comment.push(`3. **If it looks good:** Reply with "Approved" or a thumbs-up reaction.`);
              comment.push(`4. **If it needs adjustment:** Reply describing what needs to change.`);

              const body = comment.join('\n');

              // ── Post comment + update labels (both issues and PR comments) ──
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: crNum,
                body: body
              });

              // Update labels: cr-queued/cr-executing → cr-review
              for (const label of ['cr-queued', 'cr-executing', 'cr-pending']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: crNum,
                    name: label
                  });
                } catch (e) { /* label may not exist */ }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: crNum,
                labels: ['cr-review']
              });

              // ── Mark task as 'done' in Supabase ──
              await fetch(
                `${sbUrl}/rest/v1/cr_tasks?id=eq.${task.id}`,
                {
                  method: 'PATCH',
                  headers: { ...headers, 'Prefer': 'return=minimal' },
                  body: JSON.stringify({
                    status: 'done',
                    completed_at: new Date().toISOString()
                  })
                }
              );

              core.info(`Notified CR-${crNum} completion`);
            }

            // ── Handle failed/blocked tasks ──
            const failRes = await fetch(
              `${sbUrl}/rest/v1/cr_tasks?status=in.(failed,blocked,escalated)&error=not.is.null&select=*`,
              { headers }
            );
            if (!failRes.ok) return;
            const failedTasks = await failRes.json();

            for (const task of failedTasks) {
              // Only notify once — check if we already commented
              if (task.result?.notified) continue;

              const crNum = task.cr_number;
              let emoji = '⚠️';
              let statusText = 'encountered an issue';

              if (task.status === 'blocked') {
                emoji = '❓';
                statusText = 'needs clarification';
              } else if (task.status === 'escalated') {
                emoji = '🔒';
                statusText = 'requires manual review';
              } else if (task.status === 'failed') {
                emoji = '⚠️';
                statusText = 'encountered a build error — escalated to Ray';
              }

              const failDesc = task.description || '';
              const failExcerpt = failDesc.length > 200 ? failDesc.slice(0, 200) + '…' : failDesc;
              const failSourceLink = task.source_url
                ? `[your comment](${task.source_url})`
                : 'your comment';

              const bodyParts = [
                `## ${emoji} Change request ${statusText}`,
                '',
              ];
              if (task.page_url) bodyParts.push(`**Page:** ${task.page_url}`);
              if (failExcerpt) bodyParts.push(`**Requested:** ${failExcerpt}`);
              bodyParts.push(`**Source:** ${failSourceLink}`);
              bodyParts.push('');
              bodyParts.push(task.error || 'No additional details available.');
              bodyParts.push('');
              bodyParts.push('A team member will follow up shortly.');

              const body = bodyParts.join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: crNum,
                body: body
              });

              // Update labels
              for (const label of ['cr-queued', 'cr-executing', 'cr-pending']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: crNum,
                    name: label
                  });
                } catch (e) { /* ignore */ }
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: crNum,
                labels: [task.status === 'blocked' ? 'cr-blocked' : 'cr-escalated']
              });

              // Mark as notified so we don't repeat
              await fetch(
                `${sbUrl}/rest/v1/cr_tasks?id=eq.${task.id}`,
                {
                  method: 'PATCH',
                  headers: { ...headers, 'Prefer': 'return=minimal' },
                  body: JSON.stringify({
                    result: { ...(task.result || {}), notified: true }
                  })
                }
              );
            }
